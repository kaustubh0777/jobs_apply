name: Scrape Jobs and Deploy to GitHub Pages

on:
  schedule:
    # Runs every 2 hours at an off-peak minute so larger discovery batches can finish.
    - cron: '17 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Python Spreadsheet Dependencies
        run: python3 -m pip install --user -r requirements.txt

      - name: Backup Current Jobs Data
        run: |
          if [ -f src/data/jobs.json ]; then
            cp src/data/jobs.json before-jobs.json
          else
            echo '{"jobs":[]}' > before-jobs.json
          fi

      - name: Run ATS Scraper + Auto-Discovery
        env:
          RUN_ONCE: '1'
          SKIP_CATALOG_MERGE: '0'
          # Enable auto-discovery: probes unconfigured companies for ATS and
          # official career pages each run, then fetches jobs from confirmed portals.
          DISCOVERY_EVERY_CYCLE: '1'
          DISCOVERY_BATCH_SIZE: '250'
          WEB_DISCOVERY_BATCH_SIZE: '120'
          WEB_DISCOVERY_CONCURRENCY: '12'
          WEB_DISCOVERY_USE_SEARCH: '1'
          GENERIC_USE_BROWSER: '0'
          GENERIC_BATCH_SIZE: '250'
        run: npm run auto:update:once

      - name: Send Telegram Notifications
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ ! -f before-jobs.json ]; then
            echo '{"jobs":[]}' > before-jobs.json
          fi
          node scripts/send-telegram-alerts.mjs before-jobs.json src/data/jobs.json

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add src/data/ public/data/ || true
            git commit -m "chore: auto-update jobs database [skip ci]"
            # Pull remote changes and rebase to prevent non-fast-forward errors
            git pull --rebase origin main
            git push origin HEAD:refs/heads/main
            echo "Pushed updated job files."
          else
            echo "No data changes this cycle."
          fi

      - name: Build static site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
