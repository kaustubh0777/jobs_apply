name: Scrape Jobs and Deploy to GitHub Pages

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Backup Current Jobs Data
        run: |
          if [ -f src/data/jobs.json ]; then
            cp src/data/jobs.json before-jobs.json
          else
            echo '{"jobs":[]}' > before-jobs.json
          fi

      - name: Run ATS Scraper + Auto-Discovery
        env:
          RUN_ONCE: '1'
          SKIP_CATALOG_MERGE: '1'
          # Enable auto-discovery: probes 50 unconfigured companies for ATS per run
          # and performs web discovery (DuckDuckGo search) for 20 companies per run
          # to progressively map all 1649 companies automatically.
          DISCOVERY_EVERY_CYCLE: '1'
          DISCOVERY_BATCH_SIZE: '50'
          WEB_DISCOVERY_BATCH_SIZE: '20'
          WEB_DISCOVERY_USE_SEARCH: '1'
          GENERIC_USE_BROWSER: '0'
          GENERIC_BATCH_SIZE: '80'
        run: npm run auto:update:once

      - name: Fetch Naukri Jobs (Indian companies without global ATS)
        run: node scripts/fetch-naukri.mjs
        continue-on-error: true

      - name: Send Telegram Notifications
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if [ ! -f before-jobs.json ]; then
            echo '{"jobs":[]}' > before-jobs.json
          fi
          node scripts/send-telegram-alerts.mjs before-jobs.json src/data/jobs.json

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add src/data/ public/data/ || true
            git commit -m "chore: auto-update jobs database [skip ci]"
            git push origin HEAD:${{ github.ref }}
            echo "Pushed updated job files."
          else
            echo "No data changes this cycle."
          fi

      - name: Build static site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
