name: Telegram Bot (Interactive)

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # No npm ci needed — telegram-bot.mjs uses only Node.js built-ins + native fetch (Node 20)

      - name: Restore Bot Offset Cache
        uses: actions/cache/restore@v4
        with:
          path: tmp/telegram-offset.json
          # Try to restore the most recent saved offset
          key: telegram-bot-offset-never-exact-match
          restore-keys: |
            telegram-bot-offset-

      - name: Run Interactive Bot (55s polling)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/telegram-bot.mjs

      - name: Save Bot Offset Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: tmp/telegram-offset.json
          key: telegram-bot-offset-${{ github.run_id }}
