name: Telegram Bot (Interactive)

on:
  schedule:
    # Run every 5 minutes — polls for messages and responds
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # Use a stable cache key so offset persists across ALL runs
      - name: Restore Bot Offset Cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: tmp/telegram-offset.json
          key: telegram-bot-offset-stable

      - name: Clear Webhook & Run Interactive Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/telegram-bot.mjs

      # Always overwrite with latest offset after each run
      - name: Save Bot Offset Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: tmp/telegram-offset.json
          key: telegram-bot-offset-${{ github.run_id }}
