name: Telegram Bot (Interactive)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Telegram Token & Clear Webhook
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          node --input-type=module << 'JSEOF'
          const TOKEN = process.env.TELEGRAM_BOT_TOKEN

          if (!TOKEN || TOKEN.trim() === '') {
            console.error('❌ TELEGRAM_BOT_TOKEN secret is empty or not set!')
            process.exit(1)
          }

          // Verify token
          const me = await fetch(`https://api.telegram.org/bot${TOKEN}/getMe`).then(r => r.json())
          if (!me.ok) {
            console.error('❌ Token invalid:', me.description)
            process.exit(1)
          }
          console.log(`✅ Bot verified: @${me.result.username} (${me.result.first_name})`)

          // Clear webhook
          const del = await fetch(`https://api.telegram.org/bot${TOKEN}/deleteWebhook`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ drop_pending_updates: false })
          }).then(r => r.json())
          console.log('🗑️  Webhook cleared:', del.ok ? 'yes' : del.description)

          // Show pending messages count
          const upd = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ timeout: 0, limit: 5 })
          }).then(r => r.json())
          console.log(`📬 Pending updates in queue: ${upd.result?.length ?? 'unknown'}`)
          if (upd.result?.length > 0) {
            upd.result.forEach(u => {
              if (u.message) console.log(`  → msg: "${u.message.text}" from @${u.message.from?.username}`)
              if (u.callback_query) console.log(`  → cb: "${u.callback_query.data}" from @${u.callback_query.from?.username}`)
            })
          }
          JSEOF

      - name: Restore Bot Offset Cache
        uses: actions/cache/restore@v4
        with:
          path: tmp/telegram-offset.json
          key: telegram-bot-offset-never-exact-match
          restore-keys: |
            telegram-bot-offset-

      - name: Run Interactive Bot (55s polling)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/telegram-bot.mjs

      - name: Save Bot Offset Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: tmp/telegram-offset.json
          key: telegram-bot-offset-${{ github.run_id }}
